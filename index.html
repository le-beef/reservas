<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Mesas ANIVERSÁRIO LE BEEF</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <h1>Mapa de Mesas - Le Beef</h1>
    <h2>ANIVERSÁRIO LE BEEF 06/12/2025 - 23H</h2>
    <br>
    <button id="btn-exportar">📊 Exportar Lista de Ocupação (.csv)</button>
    <br><br>

    <div class="mapa-container">
        <div id="mesa-01" class="mesa livre" data-nome="01 - Mezanino"><span class="numero">01</span><span class="x-status">X</span></div>
        <div id="mesa-02" class="mesa livre" data-nome="02 - Mezanino"><span class="numero">02</span><span class="x-status">X</span></div>
        <div id="mesa-03" class="mesa livre" data-nome="03 - Mezanino"><span class="numero">03</span><span class="x-status">X</span></div>
        <div id="mesa-04" class="mesa livre" data-nome="04 - Mezanino"><span class="numero">04</span><span class="x-status">X</span></div>
        <div id="mesa-05" class="mesa livre" data-nome="05 - Mezanino"><span class="numero">05</span><span class="x-status">X</span></div>
        <div id="mesa-06" class="mesa livre" data-nome="06 - Mezanino"><span class="numero">06</span><span class="x-status">X</span></div>
        <div id="mesa-07" class="mesa livre" data-nome="07 - Mezanino"><span class="numero">07</span><span class="x-status">X</span></div>
        <div id="mesa-08" class="mesa livre" data-nome="08 - Mezanino"><span class="numero">08</span><span class="x-status">X</span></div>
        <div id="mesa-09" class="mesa livre" data-nome="09 - Mezanino"><span class="numero">09</span><span class="x-status">X</span></div>
        <div id="mesa-10" class="mesa livre" data-nome="10 - Mezanino"><span class="numero">10</span><span class="x-status">X</span></div>
        
    </div>
    
    <br>
    <div class="lista-ocupacao-container">
        <h3>🪑 Mesas Ocupadas Atualmente (<span id="contador-ocupadas">0</span>)</h3>
        <ul id="lista-mesas-ocupadas">
            <li>Nenhuma mesa ocupada no momento.</li>
        </ul>
    </div>

    <div id="modal-mesa" class="modal-overlay">
        <div class="modal-content">
            <h2>Mesa: <span id="mesa-id-display"></span></h2>
            <form id="form-ocupacao">
                <label for="nome-ocupante">Nome dos Ocupantes:</label>
                <input type="text" id="nome-ocupante" required>
                
                <label for="observacoes">Observações:</label>
                <textarea id="observacoes"></textarea>
                
                <label for="status-pagamento">Status de Pagamento:</label>
                <select id="status-pagamento">
                    <option value="nao-informado">Não Informado</option>
                    <option value="pago">Pago</option>
                    <option value="nao-pago">Não Pago</option>
                </select>

                <label for="valor-mesa">Valor da Mesa (R$):</label>
                <input type="number" id="valor-mesa" step="0.01" value="0.00">

                <div class="botoes-modal">
                    <button type="submit" class="btn-ocupar">Confirmar Ocupação</button>
                    <button type="button" class="btn-liberar" data-mesa-id="">Liberar Mesa</button>
                    <button type="button" class="btn-fechar">Fechar</button> 
                </div>
            </form>
        </div>
    </div>
</div>
    </div>
    
    <div class="botoes-rodape">
        <button id="btn-reset-geral" class="btn-perigo">⚠️ Resetar Todas as Mesas</button>
    </div>
<footer class="rodape-versao">
                  
        <div class="info-versao">
            Le Beef | Versão: 2.4.1
        </div>
    </footer>
